# Mouse
set -g mouse on

# Set terminal colors and defaults
set -g default-terminal "tmux-256color"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Change leader
unbind C-b
set -g prefix C-Space
bind Space send-prefix

# Split windows using | and -
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# Clipboard and vi mode
set -s set-clipboard external
set-window-option -g mode-keys vi

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Plugin options
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'lazygit opencode lazydocker'

# --- Tokyo Night Theme Colors ---
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# --- Active Window (The Lualine Look) ---
# 1. Dark text on Blue background
# 2. Transition: Blue foreground on Dark background for the triangle
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[fg=#7aa2f7,bg=#1a1b26,nobold]"

# --- Inactive Window ---
# Keeping it subtle so the active one pops
set -g window-status-format "#[fg=#565f89,bg=#1a1b26]  #I:#W  "

# --- Border and Messages ---
set -g pane-border-style "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1a1b26,fg=#7aa2f7"

# Layout
set -g status-left ""
set -g status-right "#[fg=#565f89] %Y-%m-%d %H:%M "


# Key bindings for pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Initialize TPM (must be the last line)
run '~/.tmux/plugins/tpm/tpm'

